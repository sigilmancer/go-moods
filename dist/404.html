<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 - Oops!!!</title>
  <style>
    body {
      background: #f5f5f5;
      color: #333;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      padding: 5%;
    }
    .container {
      max-width: 600px;
      margin: auto;
    }
    h1 {
      font-size: 5em;
      margin: 0;
    }
    p {
      font-size: 1.5em;
      margin: 1em 0;
    }
    .glitch {
      font-size: 2em;
      color: #e74c3c;
      animation: glitch 1s infinite;
    }
    @keyframes glitch {
      0% { opacity: 1; }
      50% { opacity: 0.1; }
      100% { opacity: 1; }
    }
    a {
      display: inline-block;
      margin-top: 2em;
      text-decoration: none;
      color: #3498db;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p class="glitch">You've entered the void 🌀</p>
    <p>We looked everywhere, even behind the couch cushions... but the page is missing.</p>
    <a href="/">Let's go home before the void stares back</a>
  </div>
</body>
</html>
